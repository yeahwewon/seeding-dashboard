<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인플루언서 시딩 대시보드</title>
<style>
  :root{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--border:#2e2e2e;--text:#e8e8e6;--text2:#888;--text3:#555;--purple:#7c6ff7;--purple2:#a89ff9;--green:#3ecf8e;--amber:#f5a623;--red:#f06a6a;--blue:#5ba4cf}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;font-size:13px;min-height:100vh}
  .topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .topbar-logo{font-size:15px;font-weight:700;color:var(--text)}
  .topbar-sub{font-size:12px;color:var(--text2);margin-top:2px}
  .topbar-right{display:flex;align-items:center;gap:10px}
  .sync-btn{font-size:12px;padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}
  .sync-btn:hover{border-color:var(--purple);color:var(--purple)}
  .sync-status{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:5px}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
  .dot.off{background:var(--amber);animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .container{max-width:1200px;margin:0 auto;padding:24px 20px}
  .tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:24px}
  .tab{font-size:13px;font-weight:500;padding:10px 20px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;border-radius:4px 4px 0 0}
  .tab:hover{color:var(--text);background:var(--bg3)}
  .tab.active{color:var(--purple2);border-bottom:2px solid var(--purple)}
  .pane{display:none}.pane.active{display:block}
  .loading-state{text-align:center;padding:5rem;color:var(--text3)}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}
  .section-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;margin-top:28px}
  .section-label:first-child{margin-top:0}
  .divider{height:1px;background:var(--border);margin:28px 0}
  /* SUMMARY */
  .tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:10px;margin-bottom:4px}
  .tbl-wrap table{width:100%;border-collapse:collapse}
  .tbl-wrap thead th{padding:10px 16px;color:var(--text2);font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--bg2);text-align:center;font-size:12px}
  .tbl-wrap thead th:first-child{text-align:left}
  .tbl-wrap tbody td{padding:9px 16px;border-bottom:1px solid var(--border);color:var(--text);white-space:nowrap;text-align:center;font-size:12px}
  .tbl-wrap tbody td:first-child{text-align:left;color:var(--text2)}
  .tbl-wrap tbody tr.total-row td{border-top:1px solid var(--border);font-weight:600;color:var(--text);background:var(--bg2)}
  .tbl-wrap tbody tr.total-row td:first-child{color:var(--text)}
  .tbl-wrap tbody tr:hover td{background:var(--bg3)}
  .val-empty{color:var(--text3)!important}
  /* PIPELINE */
  .pipe-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:10px;background:var(--bg2)}
  .pipe-wrap table{width:100%;border-collapse:collapse}
  .pipe-wrap thead th{padding:10px 14px;color:var(--text2);font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--bg2);text-align:center;font-size:11px}
  .pipe-wrap thead th.l{text-align:left}
  .pipe-wrap tbody td{padding:8px 14px;border-bottom:1px solid var(--border);text-align:center;font-size:12px;color:var(--text)}
  .pipe-wrap tbody td.month-cell{text-align:left;font-weight:600;color:var(--text);background:var(--bg2);border-right:1px solid var(--border);min-width:55px;font-size:11px}
  .pipe-wrap tbody td.week-cell{text-align:left;color:var(--text2);min-width:36px;font-size:11px}
  .pipe-wrap tbody tr.new-month td{border-top:1px solid var(--border)}
  .pipe-wrap tbody tr:last-child td{border-bottom:none}
  .pipe-wrap tbody tr:hover td{background:var(--bg3)}
  .pct-green{color:var(--green);font-weight:600}
  .pct-amber{color:var(--amber);font-weight:600}
  .pct-gray{color:var(--text3)}
  .val-zero{color:var(--text3)}
  .cell-inner{display:flex;flex-direction:column;align-items:center;gap:3px}
  .mini-bar{width:32px;height:2px;background:var(--bg3);border-radius:2px;overflow:hidden}
  .mini-bar-fill{height:100%;border-radius:2px}
  .error-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;color:var(--text2);line-height:2}
  .error-box b{color:var(--text)}
</style>
</head>
<body>
<div class="topbar">
  <div>
    <div class="topbar-logo">인플루언서 시딩 대시보드</div>
    <div class="topbar-sub">성분에디터 · Sungboon Editor &nbsp;|&nbsp; FY 2025–2026</div>
  </div>
  <div class="topbar-right">
    <div class="sync-status"><span class="dot off" id="dot"></span><span id="sync-txt">연결 중...</span></div>
    <button class="sync-btn" onclick="loadAll()">↻ SYNC</button>
  </div>
</div>
<div class="container">
  <div class="tabs">
    <div class="tab active" onclick="showTab('au')">🇦🇺 호주</div>
    <div class="tab" onclick="showTab('id')">🇮🇩 인도네시아</div>
  </div>
  <div id="pane-au" class="pane active"><div id="au-content"><div class="loading-state"><span class="spinner"></span>불러오는 중...</div></div></div>
  <div id="pane-id" class="pane"><div id="id-content"><div class="loading-state"><span class="spinner"></span>불러오는 중...</div></div></div>
</div>

<script>
const URLS={
  au:'https://docs.google.com/spreadsheets/d/e/2PACX-1vQhVfiw_TTXB0APbhaC-iJJGO76ovqb8hYSzT2O7aHnab8PnBpwZUKwhY0r5HGKIA/pub?gid=413156464&single=true&output=csv',
  id:'https://docs.google.com/spreadsheets/d/e/2PACX-1vSe1JZ06WjgHm-PGm6RSSvKcHY2TP05B33hkB-Q7m8Z2eoVfoEWAyiYddj5DLifOOmZxdpwYNH4569P/pub?gid=972980346&single=true&output=csv'
};

function showTab(c){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['au','id'][i]===c));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-'+c).classList.add('active');
}

function parseCSV(text){
  return text.trim().split('\n').map(line=>{
    const cells=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){inQ=!inQ;}
      else if(line[i]===','&&!inQ){cells.push(cur.trim());cur='';}
      else cur+=line[i];
    }
    cells.push(cur.trim());
    return cells;
  });
}

function isEmpty(r){return!r||r.every(c=>!c||c.trim()==='');}

// 각 row에서 실제 내용 있는 첫 컬럼 인덱스 찾기
function findStartCol(rows){
  for(const r of rows){
    for(let i=0;i<r.length;i++){
      if(r[i]&&r[i].trim()!=='')return i;
    }
  }
  return 0;
}

function splitTables(rows){
  const tables=[];let cur=[];
  for(const r of rows){
    if(isEmpty(r)){if(cur.length){tables.push(cur);cur=[];}}
    else cur.push(r);
  }
  if(cur.length)tables.push(cur);
  return tables;
}

function fmtPct(s){
  if(!s||s.trim()==='')return{txt:'–',cls:'pct-gray'};
  const n=parseFloat(s);
  if(isNaN(n))return{txt:'–',cls:'pct-gray'};
  return{txt:Math.round(n)+'%',cls:n>=70?'pct-green':n>=30?'pct-amber':'pct-gray'};
}

function fmtNum(s){
  if(!s||s.trim()==='')return{txt:'–',zero:true};
  const n=parseFloat(String(s).replace(/[^0-9.]/g,''));
  if(isNaN(n))return{txt:s,zero:false};
  return{txt:String(Math.round(n)),zero:n===0};
}

// 시작 컬럼 오프셋 적용해서 rows 정리
function trimRows(rows){
  const startCol=findStartCol(rows);
  return rows.map(r=>r.slice(startCol));
}

function renderSummary(rows){
  // 첫행이 타이틀인 경우 스킵, 헤더 찾기
  // 2025-2026 이 있는 행을 헤더로
  let headerIdx=rows.findIndex(r=>r.some(c=>/2025|2026|may|june|jan/i.test(c||'')));
  if(headerIdx<0)headerIdx=0;
  const head=rows[headerIdx];
  const body=rows.slice(headerIdx+1).filter(r=>!isEmpty(r));

  let h=`<div class="tbl-wrap"><table><thead><tr>`;
  head.forEach(c=>h+=`<th>${c||''}</th>`);
  h+=`</tr></thead><tbody>`;
  body.forEach(r=>{
    const isTotal=/(전체|total|합계)/i.test(r[0]||'');
    h+=`<tr class="${isTotal?'total-row':''}">`;
    r.forEach((c,i)=>{
      const empty=!c||c.trim()===''||c.trim()==='0';
      h+=`<td class="${i>0&&empty?'val-empty':''}">${c||'–'}</td>`;
    });
    h+=`</tr>`;
  });
  return h+`</tbody></table></div>`;
}

function renderPipeline(rows){
  // Month/Week 헤더 행 찾기
  let headerIdx=rows.findIndex(r=>r.some(c=>/(^month$|^week$)/i.test((c||'').trim())));
  if(headerIdx<0)headerIdx=0;

  const head=rows[headerIdx].map(h=>(h||'').trim());
  const body=rows.slice(headerIdx+1).filter(r=>!isEmpty(r));

  const find=(aliases)=>{
    return head.findIndex(h=>aliases.some(a=>h.toLowerCase().replace(/\s/g,'')=== a.toLowerCase().replace(/\s/g,'')));
  };
  const findContains=(aliases)=>{
    return head.findIndex(h=>aliases.some(a=>h.toLowerCase().includes(a.toLowerCase())));
  };

  const ci={
    month:     find(['month']),
    week:      find(['week']),
    listing:   find(['listing']),
    contact:   find(['contact']),
    response:  find(['response']),
    pending:   findContains(['pending']),
    delivered: findContains(['deliver']),
    upload:    findContains(['upload']),
    respRate:  findContains(['response rate']),
    accRate:   findContains(['acceptance rate','accept']),
  };
  // response rate가 response보다 먼저 안잡히도록
  if(ci.response===ci.respRate && ci.respRate>-1){
    ci.response=head.findIndex((h,i)=>/^responses?$/i.test(h.trim())&&i!==ci.respRate);
  }

  const COLS=[
    {key:'listing',  label:'리스팅',   color:'#a89ff9'},
    {key:'contact',  label:'컨택',     color:'#7c6ff7'},
    {key:'response', label:'배송 대기',color:'#f5a623'},
    {key:'pending',  label:'Pending',  color:'#f5a623'},
    {key:'delivered',label:'배송완료', color:'#3ecf8e'},
    {key:'upload',   label:'업로드',   color:'#5ba4cf'},
    {key:'respRate', label:'응답률',   isPct:true},
    {key:'accRate',  label:'수락률',   isPct:true},
  ].filter(c=>ci[c.key]>-1);

  let h=`<div class="pipe-wrap"><table><thead><tr>`;
  h+=`<th class="l">Month</th><th class="l">Week</th>`;
  COLS.forEach(c=>h+=`<th>${c.label}</th>`);
  h+=`</tr></thead><tbody>`;

  let prevMonth='';
  const listIdx=ci.listing;

  body.forEach(r=>{
    const month=(ci.month>-1?r[ci.month]||'':'').trim();
    const week=(ci.week>-1?r[ci.week]||'':'').trim();
    const isNew=month&&month!==prevMonth;
    if(isNew)prevMonth=month;
    const listN=listIdx>-1?parseFloat(String(r[listIdx]||'0').replace(/[^0-9.]/g,''))||0:0;

    h+=`<tr class="${isNew?'new-month':''}">`;
    h+=`<td class="month-cell">${isNew?month:''}</td>`;
    h+=`<td class="week-cell">${week}</td>`;
    COLS.forEach(c=>{
      const raw=r[ci[c.key]]||'';
      if(c.isPct){
        const p=fmtPct(raw);
        h+=`<td class="${p.cls}">${p.txt}</td>`;
      } else {
        const n=fmtNum(raw);
        const barPct=listN>0?Math.min(Math.round((parseFloat(n.txt)||0)/listN*100),100):0;
        h+=`<td class="${n.zero?'val-zero':''}"><div class="cell-inner"><span>${n.txt}</span>`;
        if(listN>0&&!n.zero)h+=`<div class="mini-bar"><div class="mini-bar-fill" style="width:${barPct}%;background:${c.color}"></div></div>`;
        h+=`</div></td>`;
      }
    });
    h+=`</tr>`;
  });
  return h+`</tbody></table></div>`;
}

function setSyncStatus(ok){
  const dot=document.getElementById('dot');
  const txt=document.getElementById('sync-txt');
  dot.className='dot'+(ok?'':' off');
  txt.textContent=ok?'연결됨':'연결 중...';
}

async function loadCountry(key){
  const el=document.getElementById(key+'-content');
  let text=null;
  const proxies=[u=>u, u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`, u=>`https://corsproxy.io/?${encodeURIComponent(u)}`];
  for(const p of proxies){
    try{
      const res=await fetch(p(URLS[key]),{cache:'no-store'});
      if(res.ok){const t=await res.text();if(t&&t.length>20&&!t.trim().startsWith('<')){text=t;break;}}
    }catch(e){}
  }
  if(!text){
    el.innerHTML=`<div class="error-box"><b>시트를 불러오지 못했어요</b><br>구글 시트 → 파일 → <b>웹에 게시</b> → <b>게시</b> 버튼 클릭 후 SYNC 눌러주세요.</div>`;
    setSyncStatus(false);return;
  }
  setSyncStatus(true);

  const allRows=parseCSV(text);
  const tables=splitTables(allRows);
  let html='';

  if(tables.length===0){
    html=`<div class="error-box">데이터가 비어있어요.</div>`;
  } else if(tables.length===1){
    const trimmed=trimRows(tables[0]);
    html+=`<div class="section-label">시딩 현황</div>`;
    html+=renderPipeline(trimmed);
  } else {
    // 첫번째 표 - 요약
    const t1=trimRows(tables[0]);
    // 두번째 표 - 파이프라인 (여러 빈 테이블 건너뛰고 Month/Week 있는 거 찾기)
    let pipeTable=null;
    for(let i=1;i<tables.length;i++){
      const trimmed=trimRows(tables[i]);
      const hasHeader=trimmed.some(r=>r.some(c=>/(^month$|^week$)/i.test((c||'').trim())));
      if(hasHeader){pipeTable=trimmed;break;}
    }

    html+=`<div class="section-label">${key==='au'?'호주 거래처별 시딩 수량':'인도네시아 캠페인별 시딩 수량'}</div>`;
    html+=renderSummary(t1);
    if(pipeTable){
      html+=`<div class="divider"></div>`;
      html+=`<div class="section-label">${key==='au'?'AU Australia Unpaid Seeding Status 2026':'ID Indonesia Unpaid Seeding Status 2026'}</div>`;
      html+=renderPipeline(pipeTable);
    }
  }
  el.innerHTML=html;
}

function loadAll(){
  setSyncStatus(false);
  ['au','id'].forEach(k=>{
    document.getElementById(k+'-content').innerHTML=`<div class="loading-state"><span class="spinner"></span>불러오는 중...</div>`;
    loadCountry(k);
  });
}
loadAll();
</script>
</body>
</html>
